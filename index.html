<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PulseTap – Crypto Mining</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="user-info">
                <span id="username">Loading...</span>
                <span class="level-badge" id="levelBadge">Lv 1</span>
            </div>
            <div class="balance-card">
                <span class="balance-label">💰 Balance</span>
                <span class="balance-value" id="balance">0</span>
                <span class="token-symbol">PULSE</span>
            </div>
        </div>

        <!-- Tap Button Area -->
        <div class="mining-area">
            <div class="energy-bar">
                <div class="energy-fill" id="energyFill" style="width: 100%"></div>
                <span class="energy-text" id="energyText">1000/1000</span>
            </div>
            <div class="tap-button" id="tapButton">
                <div class="ripple"></div>
                <span class="lightning">⚡</span>
            </div>
            <div class="tap-value">+<span id="tapValue">1</span> per tap</div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat">
                <span class="stat-label">Total Mined</span>
                <span class="stat-value" id="totalMined">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Level</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">Next Level</span>
                <span class="stat-value" id="nextLevelCost">100</span>
            </div>
        </div>

        <!-- Upgrade Button -->
        <button class="upgrade-btn" id="upgradeBtn">⬆️ Upgrade Mining Power</button>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="leaderboard">🏆 Leaderboard</button>
            <button class="tab-btn" data-tab="referral">👥 Referral</button>
            <button class="tab-btn" data-tab="missions">📋 Missions</button>
        </div>

        <!-- Tab Content -->
        <div id="leaderboard" class="tab-content active">
            <div class="leaderboard-list" id="leaderboardList">
                <div class="loading">Loading top miners...</div>
            </div>
        </div>

        <div id="referral" class="tab-content">
            <div class="referral-box">
                <p>Invite friends & earn <strong>10%</strong> of their taps!</p>
                <div class="referral-link-box">
                    <input type="text" id="referralLink" readonly>
                    <button id="copyLinkBtn">📋 Copy</button>
                </div>
                <div class="referral-stats">
                    <span>👥 Referrals: <strong id="referralCount">0</strong></span>
                    <span>🎁 Bonus Earned: <strong id="referralBonus">0</strong></span>
                </div>
            </div>
        </div>

        <div id="missions" class="tab-content">
            <div class="mission-list" id="missionList">
                <div class="mission">
                    <span>🏆 Tap 1000 times today</span>
                    <span id="missionTapProgress">0/1000</span>
                </div>
                <div class="mission">
                    <span>👥 Invite 1 friend</span>
                    <span id="missionInviteProgress">0/1</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
