<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>HOT NFT Studio | Mint Your Digital Asset</title>
  <!-- Thirdweb SDK -->
  <script src="https://unpkg.com/@thirdweb-dev/sdk@latest/dist/thirdweb.min.js"></script>
  <!-- Google Fonts & modern reset -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Glassmorphic card */
    .glass-card {
      max-width: 580px;
      width: 100%;
      margin: 0 auto;
      background: rgba(12, 20, 28, 0.65);
      backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      border: 1px solid rgba(0, 255, 204, 0.25);
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 204, 0.1);
      padding: 1.8rem 1.5rem 2rem;
      transition: all 0.2s ease;
    }

    h2 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #00ffcc, #ff66cc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      margin-bottom: 0.4rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .sub {
      color: #8aaec0;
      font-size: 0.85rem;
      margin-bottom: 1.8rem;
      border-left: 3px solid #00ffcc;
      padding-left: 12px;
      background: rgba(0,255,204,0.05);
      border-radius: 0 12px 12px 0;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1.8rem;
      text-align: left;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #b3f0e6;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label i {
      font-style: normal;
      font-weight: 600;
    }

    input {
      width: 100%;
      background: #0f1a1f;
      border: 1.5px solid #2a3b44;
      border-radius: 2rem;
      padding: 14px 20px;
      font-size: 1rem;
      color: #f0f9ff;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: #00ffcc;
      box-shadow: 0 0 0 3px rgba(0,255,204,0.2);
      background: #0a1217;
    }

    input::placeholder {
      color: #4f6e7a;
      font-weight: 400;
    }

    button {
      background: linear-gradient(95deg, #00ccb0, #00e6c0);
      border: none;
      border-radius: 3rem;
      padding: 12px 24px;
      font-weight: 700;
      font-size: 1rem;
      color: #0a0f1a;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 5px 12px rgba(0,255,204,0.2);
      letter-spacing: 0.3px;
    }

    button:active {
      transform: scale(0.97);
    }

    .generate-btn {
      background: linear-gradient(95deg, #00ffcc, #2ad4b6);
      margin-bottom: 1.5rem;
    }

    .mint-btn {
      background: linear-gradient(95deg, #ff44cc, #cc33aa);
      color: white;
      box-shadow: 0 5px 15px rgba(255, 68, 204, 0.3);
      margin-top: 1rem;
    }

    .canvas-container {
      background: #010a0e;
      border-radius: 1.8rem;
      padding: 0.6rem;
      box-shadow: 0 15px 25px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      margin: 0.5rem 0 1rem;
      border: 1px solid rgba(0,255,204,0.3);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: 1.2rem;
      background: #071217;
      object-fit: contain;
    }

    .info-panel {
      background: rgba(0, 20, 24, 0.7);
      border-radius: 1.5rem;
      padding: 0.8rem 1rem;
      margin: 1rem 0 0.5rem;
      font-size: 0.75rem;
      color: #7fc1b5;
      text-align: left;
      border-left: 3px solid #00ffcc;
    }

    .status {
      font-size: 0.8rem;
      margin-top: 1rem;
      padding: 8px;
      border-radius: 40px;
      background: rgba(0,0,0,0.4);
      color: #bbe9e0;
      word-break: break-word;
    }

    .loader {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #00ffcc;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .flex-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1.5rem;
      color: #2d6a6b;
    }

    @media (max-width: 480px) {
      .glass-card {
        padding: 1.4rem 1.2rem;
      }
      h2 {
        font-size: 1.6rem;
      }
      button {
        padding: 12px 18px;
      }
    }
  </style>
</head>
<body>
<div class="glass-card">
  <h2>⚡ HOT NFT Studio <span style="font-size:1.4rem;">🎨</span></h2>
  <div class="sub">Generate exclusive on-chain art based on NEAR account age</div>

  <div class="input-group">
    <label><i>👤</i> NEAR Username / Account ID</label>
    <input type="text" id="userInput" placeholder="e.g., ashikur160.tg or your.near" value="ashikur160.tg">
  </div>

  <button class="generate-btn" id="generateBtn">✨ Generate NFT Artwork</button>

  <div class="canvas-container">
    <canvas id="nftCanvas" width="512" height="512"></canvas>
  </div>

  <button class="mint-btn" id="mintBtn">💎 Mint NFT (EVM / Thirdweb)</button>

  <div class="info-panel" id="infoPanel">
    🔮 <strong>NFT preview</strong> — your unique style based on account tenure.
  </div>
  <div class="status" id="statusMsg">✨ Ready. Enter username & generate.</div>
  <footer>🔗 Powered by NEAR Blocks | EVM mint via Thirdweb</footer>
</div>

<script>
  (function() {
    // ---------- CONFIG ----------
    const API_KEY = "A766D9C1980F437CA67F5E5ECFF9A305";
    // UPDATED: MODERN BACKGROUNDS (different tiers) - high quality abstract/cyberpunk gradients + images
    // We'll use curated high-res images from reliable CDN (free usable assets)
    // For tiers: 20+ months, 15-19, 10-14, 5-9, <5 months => different backgrounds
    const BG_TIERS = [
      { minMonths: 20, url: "https://iili.io/BT7PDu9.jpg" },       // epic landscape
      { minMonths: 15, url: "https://picsum.photos/id/29/512/512" },        // city vibes
      { minMonths: 10, url: "https://picsum.photos/id/42/512/512" },        // piano abstract
      { minMonths: 5, url: "https://picsum.photos/id/155/512/512" },        // coral reef
      { minMonths: 0, url: "https://picsum.photos/id/96/512/512" }          // mountain waterfall
    ];
    // we also use vibrant overlay per tier (extra style)
    
    let currentImageBlob = null;
    let lastGeneratedMeta = { user: "", firstDate: "", months: 0 };
    const canvas = document.getElementById("nftCanvas");
    const ctx = canvas.getContext("2d");

    // Helper: fetch first transaction date from NEARBlocks
    async function fetchFirstTxDate(username) {
      if (!username || username.trim() === "") {
        throw new Error("Username required");
      }
      const headers = { "Authorization": "Bearer " + API_KEY };
      const url = `https://api.nearblocks.io/v1/account/${encodeURIComponent(username)}/txns?order=asc&limit=1`;
      const response = await fetch(url, { headers });
      if (!response.ok) {
        throw new Error(`API error ${response.status}`);
      }
      const data = await response.json();
      if (data.txns && data.txns.length > 0) {
        const ts = data.txns[0].block_timestamp / 1000000; // milliseconds
        const firstDateObj = new Date(ts);
        const formattedUTC = firstDateObj.toUTCString();
        const now = new Date();
        let monthsDiff = (now.getFullYear() - firstDateObj.getFullYear()) * 12 + (now.getMonth() - firstDateObj.getMonth());
        if (monthsDiff < 0) monthsDiff = 0;
        return { date: formattedUTC, months: monthsDiff };
      } else {
        // no transactions: fallback (new account)
        const fallbackDate = new Date().toUTCString();
        return { date: fallbackDate, months: 0 };
      }
    }

    // get background by months
    function getBackgroundImageUrl(months) {
      for (let tier of BG_TIERS) {
        if (months >= tier.minMonths) {
          return tier.url;
        }
      }
      return BG_TIERS[BG_TIERS.length-1].url;
    }

    // Additional style accents: dynamic glows, gradient text based on tenure
    function drawDynamicArtwork(ctx, months, username, activeSince) {
      // background is drawn via image, but we add extra modern effects: neon border, particles, holographic shine
      // after image loads we will overlay effects (called inside image.onload)
      // but we also apply custom gradients and shapes for rarity
      // This function will be called after bg is drawn
      const gradientBar = ctx.createLinearGradient(0, 440, 512, 512);
      gradientBar.addColorStop(0, "rgba(0,0,0,0.65)");
      gradientBar.addColorStop(1, "rgba(10,20,30,0.85)");
      ctx.fillStyle = gradientBar;
      ctx.fillRect(0, 340, 512, 172);
      
      // neon overlay lines
      ctx.beginPath();
      ctx.strokeStyle = "#00ffcc";
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 8]);
      ctx.moveTo(20, 335);
      ctx.lineTo(492, 335);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // TITLE text: "HOT NFT | tenure badge"
      ctx.font = "bold 20px 'Inter', system-ui";
      ctx.fillStyle = "#00ffcc";
      ctx.shadowBlur = 0;
      ctx.fillText("⚡ ORIGIN NFT", 20, 375);
      
      // Username label + value
      ctx.font = "500 16px 'Inter'";
      ctx.fillStyle = "#bdf2e8";
      ctx.fillText("OWNER", 20, 412);
      ctx.font = "bold 17px monospace";
      ctx.fillStyle = "#ffffff";
      let displayUser = username.length > 28 ? username.slice(0,24)+"..." : username;
      ctx.fillText(displayUser, 20, 438);
      
      // Active since label
      ctx.font = "500 14px 'Inter'";
      ctx.fillStyle = "#6ee7db";
      ctx.fillText("⏱️ ACTIVE SINCE", 20, 470);
      ctx.font = "13px monospace";
      ctx.fillStyle = "#c5e6ff";
      let shortDate = activeSince.split(" ").slice(0,4).join(" ");
      ctx.fillText(shortDate, 20, 492);
      
      // Tenure badge (months)
      let badgeText = `${months} MONTH${months !== 1 ? 'S' : ''} ON CHAIN`;
      ctx.font = "bold 14px 'Inter'";
      ctx.fillStyle = "#ff66cc";
      ctx.shadowColor = "#ff44aa";
      ctx.shadowBlur = 6;
      ctx.fillText(badgeText, 360, 495);
      ctx.shadowBlur = 0;
      
      // Dynamic rarity indicator
      let rarityLevel = "";
      if (months >= 20) rarityLevel = "LEGENDARY 🔥";
      else if (months >= 15) rarityLevel = "EPIC 💎";
      else if (months >= 10) rarityLevel = "RARE ✨";
      else if (months >= 5) rarityLevel = "UNCOMMON 🟢";
      else rarityLevel = "NEWCOMER 🌱";
      
      ctx.font = "italic 12px 'Inter'";
      ctx.fillStyle = "#ffdd99";
      ctx.fillText(rarityLevel, 360, 470);
      
      // small graphic: neon dot grid
      for (let i=0;i<3;i++) {
        ctx.beginPath();
        ctx.arc(480 - (i*12), 370, 3, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0, 255, 204, ${0.3 + (months%10)/20})`;
        ctx.fill();
      }
    }
    
    function generateNFTImage(user, firstDate, months) {
      return new Promise((resolve, reject) => {
        const bgUrl = getBackgroundImageUrl(months);
        const bgImage = new Image();
        bgImage.crossOrigin = "Anonymous";
        bgImage.onload = () => {
          // clear canvas
          ctx.clearRect(0, 0, 512, 512);
          ctx.drawImage(bgImage, 0, 0, 512, 512);
          // apply extra effects / overlays
          drawDynamicArtwork(ctx, months, user, firstDate);
          // draw additional border / neon frame
          ctx.strokeStyle = "#00ffcc";
          ctx.lineWidth = 3;
          ctx.strokeRect(8, 8, 496, 496);
          ctx.strokeStyle = "#ff44cc";
          ctx.lineWidth = 1.5;
          ctx.strokeRect(12, 12, 488, 488);
          
          // convert to blob
          canvas.toBlob(blob => {
            if (blob) {
              currentImageBlob = blob;
              resolve(blob);
            } else {
              reject(new Error("Failed to generate image blob"));
            }
          }, "image/png");
        };
        bgImage.onerror = () => {
          // fallback: generate gradient background if images fail
          ctx.fillStyle = "#0a1118";
          ctx.fillRect(0, 0, 512, 512);
          const grad = ctx.createLinearGradient(0, 0, 512, 512);
          grad.addColorStop(0, "#0b2b2b");
          grad.addColorStop(1, "#1a0f1a");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, 512, 512);
          drawDynamicArtwork(ctx, months, user, firstDate);
          canvas.toBlob(blob => {
            currentImageBlob = blob;
            resolve(blob);
          }, "image/png");
        };
        bgImage.src = bgUrl;
      });
    }
    
    // Main generate flow with loading & status
    const generateBtn = document.getElementById("generateBtn");
    const mintBtn = document.getElementById("mintBtn");
    const statusDiv = document.getElementById("statusMsg");
    const userInput = document.getElementById("userInput");
    const infoPanel = document.getElementById("infoPanel");
    
    async function loadDataAndGenerate() {
      let rawUser = userInput.value.trim();
      if (!rawUser) {
        statusDiv.innerHTML = "⚠️ Please enter a NEAR username (e.g., example.near)";
        return;
      }
      statusDiv.innerHTML = "<span class='loader'></span> Fetching on-chain data from NEAR...";
      generateBtn.disabled = true;
      mintBtn.disabled = false; // but mint will require generated image
      try {
        const { date, months } = await fetchFirstTxDate(rawUser);
        lastGeneratedMeta = { user: rawUser, firstDate: date, months: months };
        statusDiv.innerHTML = `📡 Account age: ${months} month(s) — generating artwork...`;
        infoPanel.innerHTML = `🎨 Tenure: ${months} months | Genesis: ${date.split(" ").slice(0,4).join(" ")} | Rarity: ${getRarityText(months)}`;
        
        await generateNFTImage(rawUser, date, months);
        statusDiv.innerHTML = "✅ NFT preview ready! You can now mint on-chain 🚀";
        generateBtn.disabled = false;
      } catch (err) {
        console.error(err);
        statusDiv.innerHTML = `❌ Error: ${err.message || "Failed to load data"}`;
        generateBtn.disabled = false;
        // fallback: generate placeholder without real data
        const fallbackDate = new Date().toUTCString();
        await generateNFTImage(rawUser, fallbackDate, 0);
        statusDiv.innerHTML = "⚠️ Used fallback data (API limited). Preview ready but tenure may be 0.";
      }
    }
    
    function getRarityText(months) {
      if (months >= 20) return "LEGENDARY";
      if (months >= 15) return "EPIC";
      if (months >= 10) return "RARE";
      if (months >= 5) return "UNCOMMON";
      return "COMMON";
    }
    
    // MINT NFT function using Thirdweb (EVM)
    async function mintNFT() {
      if (!currentImageBlob) {
        statusDiv.innerHTML = "⚠️ No artwork generated. Click 'Generate NFT Artwork' first.";
        return;
      }
      if (!window.ethereum) {
        statusDiv.innerHTML = "🦊 MetaMask not detected! Please install MetaMask to mint NFT.";
        return;
      }
      
      statusDiv.innerHTML = "<span class='loader'></span> Connecting wallet & preparing mint...";
      mintBtn.disabled = true;
      try {
        await window.ethereum.request({ method: "eth_requestAccounts" });
        const sdk = new window.ThirdwebSDK(window.ethereum);
        // get connected address
        const signerAddress = await sdk.wallet.getAddress();
        statusDiv.innerHTML = `🔗 Wallet: ${signerAddress.slice(0,6)}...${signerAddress.slice(-4)} | Uploading to IPFS...`;
        
        // CONTRACT ADDRESS — IMPORTANT: replace with your actual NFT contract address (ERC721)
        // For demo safety we show placeholder but user must replace before minting. Provide instructions.
        const CONTRACT_ADDRESS = "0x499b7e057Ab27d6771FAd60d5F25b832e6B8c555"; // dummy placeholder
        // In production, user should set their own contract address. We'll add a clear warning.
        if (CONTRACT_ADDRESS === "0x499b7e057Ab27d6771FAd60d5F25b832e6B8c555") {
          statusDiv.innerHTML = "⚠️ [DEMO MODE] Replace contract address in script with your deployed Thirdweb ERC721 contract address. Mint not executed.";
          mintBtn.disabled = false;
          return;
        }
        
        const contract = await sdk.getContract(CONTRACT_ADDRESS);
        // upload metadata
        const metadata = {
          name: `HOT Genesis #${lastGeneratedMeta.user.substring(0,8)}`,
          description: `Exclusive NFT based on NEAR account age: ${lastGeneratedMeta.months} months. First active: ${lastGeneratedMeta.firstDate}. Rarity tier: ${getRarityText(lastGeneratedMeta.months)}`,
          image: currentImageBlob,
          attributes: [
            { trait_type: "Tenure Months", value: lastGeneratedMeta.months },
            { trait_type: "Rarity", value: getRarityText(lastGeneratedMeta.months) },
            { trait_type: "Platform", value: "HOT NFT Studio" }
          ]
        };
        const uri = await sdk.storage.upload(metadata);
        statusDiv.innerHTML = "⛓️ Minting NFT on blockchain... (confirm in wallet)";
        const mintTx = await contract.erc721.mint({
          to: signerAddress,
          tokenURI: uri
        });
        statusDiv.innerHTML = `🎉 NFT MINTED! 🚀 Transaction: ${mintTx.receipt.transactionHash.slice(0,10)}... View on explorer.`;
        mintBtn.disabled = false;
      } catch (err) {
        console.error(err);
        statusDiv.innerHTML = `❌ Mint error: ${err.message || "Transaction failed or contract not configured"}`;
        mintBtn.disabled = false;
      }
    }
    
    // Event listeners
    generateBtn.addEventListener("click", loadDataAndGenerate);
    mintBtn.addEventListener("click", mintNFT);
    
    // prefill default demo? optionally generate on load a preview for placeholder
    window.addEventListener("load", () => {
      // initial preview background with demo text
      const demoUser = "ashikur160.tg";
      const demoDate = new Date().toUTCString();
      generateNFTImage(demoUser, demoDate, 4).catch(e=>console.warn);
      statusDiv.innerHTML = "✨ Enter your NEAR username & click Generate. 🔥 Your NFT reflects real blockchain age!";
    });
  })();
</script>
</body>
</html>
