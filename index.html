<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Degenz CAT Mint</title>

  <!-- Ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .card {
      background: #161616;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
      margin-bottom: 20px;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff00cc, #3333ff);
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .wallet {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>Degenz CAT</h1>

    <div class="card">
      <img src="https://iili.io/Bg5RdSn.gif" alt="NFT"/>
      <div class="info">
        Price: FREE ETH<br/>
        Network: Base<br/>
        Supply: 1819
      </div>
    </div>

    <button class="btn" onclick="connectWallet()">Connect Wallet</button>
    <button class="btn" onclick="mintNFT()">Mint Now</button>

    <div class="wallet" id="wallet"></div>
  </div>

  <script>
    let provider;
    let signer;
    let userAddress;

    const contractAddress = "0x2D229fd380ed2afC3DB064aeB980736A151f0c20";

    // 🔥 BASIC ERC721 ABI (mint function)
    const abi = [
      "function mint(uint256 quantity) public payable"
    ];

    async function connectWallet() {
      if (window.ethereum) {
        try {
          provider = new ethers.providers.Web3Provider(window.ethereum);
          await provider.send("eth_requestAccounts", []);
          signer = provider.getSigner();
          userAddress = await signer.getAddress();

          document.getElementById("wallet").innerText =
            "Connected: " + userAddress;

        } catch (err) {
          alert("Connection failed");
        }
      } else {
        alert("Please install MetaMask");
      }
    }

    async function mintNFT() {
      if (!signer) {
        alert("Connect wallet first!");
        return;
      }

      try {
        const contract = new ethers.Contract(contractAddress, abi, signer);

        const tx = await contract.mint(1, {
          value: ethers.utils.parseEther("0.00")
        });

        alert("Minting... please wait");

        await tx.wait();

        alert("Mint Successful 🚀");

      } catch (err) {
        console.error(err);
        alert("Mint failed ❌");
      }
    }
  </script>

</body>
</html>
