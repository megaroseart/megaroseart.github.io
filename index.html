<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Degenz CAT Mint</title>

  <!-- Thirdweb SDK -->
  <script src="https://unpkg.com/@thirdweb-dev/sdk@latest/dist/thirdweb-dev-sdk.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .card {
      background: #161616;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
      margin-bottom: 20px;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff00cc, #3333ff);
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .wallet {
      font-size: 12px;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>Degenz CAT</h1>

    <div class="card">
      <img src="https://iili.io/Bg5RdSn.gif" alt="NFT"/>
      <div class="info">
        Price: 0.05 SOL<br/>
        Supply: 1819
      </div>
    </div>

    <button class="btn" onclick="connectWallet()">Connect Wallet</button>
    <button class="btn" onclick="mintNFT()">Mint Now</button>

    <div class="wallet" id="wallet"></div>
  </div>

  <script>
    let provider = null;
    let walletAddress = null;

    async function connectWallet() {
      try {
        if (window.solana && window.solana.isPhantom) {
          const resp = await window.solana.connect();
          walletAddress = resp.publicKey.toString();
          document.getElementById("wallet").innerText = "Connected: " + walletAddress;
        } else {
          alert("Please install Phantom Wallet");
        }
      } catch (err) {
        alert("Connection failed");
      }
    }

    async function mintNFT() {
      if (!walletAddress) {
        alert("Connect wallet first!");
        return;
      }

      try {
        alert("Minting started...");

        // 🔥 THIRDWEB PLACEHOLDER
        const sdk = new window.ThirdwebSDK("solana");

        const program = await sdk.getProgram("YOUR_CONTRACT_ADDRESS");

        // Example mint call (adjust based on your contract)
        await program.rpc.mint();

        alert("Mint Successful 🚀");

      } catch (err) {
        console.error(err);
        alert("Mint failed ❌");
      }
    }
  </script>

</body>
</html>
