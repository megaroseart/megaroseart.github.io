<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risograph NFT Gallery</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=DM+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'Space Mono', monospace; }

    .riso-filter {
      filter: 
        contrast(1.6) 
        saturate(0.25) 
        brightness(1.15)
        hue-rotate(-5deg)
        drop-shadow(0 0 1px rgba(0,0,0,0.2));
      position: relative;
    }

    .riso-filter::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 2px,
          rgba(255,90,95,0.08) 2px,
          rgba(255,90,95,0.08) 4px
        ),
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 2px,
          rgba(0,120,255,0.06) 2px,
          rgba(0,120,255,0.06) 4px
        );
      pointer-events: none;
      mix-blend-mode: multiply;
      z-index: 2;
    }

    .riso-filter::after {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          rgba(0,0,0,0.04) 0px,
          rgba(0,0,0,0.04) 1px,
          transparent 1px,
          transparent 2px
        );
      pointer-events: none;
      z-index: 3;
      mix-blend-mode: overlay;
    }

    .riso-overlay {
      position: relative;
      background: linear-gradient(135deg, rgba(255,90,95,0.12), rgba(0,120,255,0.08));
    }

    .riso-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        rgba(0,0,0,0.02) 0px,
        rgba(0,0,0,0.02) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: multiply;
    }

    .card-enter { animation: cardIn 0.4s ease forwards; opacity: 0; }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grain {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    .modal-backdrop {
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .nft-img { transition: filter 0.3s ease; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-[#1a1a2e] text-[#e0e0e0] overflow-auto scrollbar-thin">
  <div id="app" class="w-full min-h-full grain">
   <!-- Header -->
   <header class="sticky top-0 z-30 backdrop-blur-md bg-[#1a1a2e]/80 border-b border-[#2a2a4a] px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
     <div>
      <h1 id="main-title" class="mono text-2xl font-bold text-[#ff5a5f]">Risograph NFT Gallery</h1>
      <p id="subtitle" class="text-sm text-[#8888aa] mt-1">10,000 NFTs reimagined in Risograph style</p>
     </div>
     <div class="flex items-center gap-3">
      <div class="flex items-center bg-[#2a2a4a] rounded-lg overflow-hidden">
       <button id="prev-btn" class="px-3 py-2 hover:bg-[#3a3a5a] transition"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
       <div class="px-3 py-2 mono text-sm">
        <span>Page </span><input id="page-input" type="number" min="1" max="500" value="1" class="w-12 bg-transparent text-center text-[#ff5a5f] outline-none mono"> / <span id="total-pages">500</span>
       </div><button id="next-btn" class="px-3 py-2 hover:bg-[#3a3a5a] transition"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
      </div><input id="search-input" type="number" placeholder="Go to #ID" min="1" max="9998" class="bg-[#2a2a4a] rounded-lg px-3 py-2 w-28 text-sm outline-none focus:ring-1 focus:ring-[#ff5a5f] mono">
     </div>
    </div>
   </header><!-- Grid -->
   <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    <div id="loading" class="hidden text-center py-12">
     <div class="inline-block w-8 h-8 border-2 border-[#ff5a5f] border-t-transparent rounded-full animate-spin"></div>
     <p class="mt-3 text-[#8888aa] text-sm">Loading NFTs...</p>
    </div>
   </main><!-- Modal -->
   <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
    <div class="modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm" id="modal-backdrop"></div>
    <div class="relative bg-[#1e1e38] rounded-2xl max-w-lg w-full max-h-[90%] overflow-auto shadow-2xl border border-[#3a3a5a]">
     <button id="modal-close" class="absolute top-3 right-3 z-10 bg-[#2a2a4a] rounded-full p-2 hover:bg-[#ff5a5f] transition"> <i data-lucide="x" class="w-4 h-4"></i> </button>
     <div id="modal-img-wrap" class="relative overflow-hidden rounded-t-2xl riso-overlay">
      <img id="modal-img" class="w-full aspect-square object-cover riso-filter nft-img" src="" alt="NFT">
     </div>
     <div class="p-5">
      <div class="flex items-center justify-between mb-4">
       <h2 id="modal-title" class="mono text-lg font-bold text-[#ff5a5f]"></h2><button id="toggle-original" class="mono text-xs bg-[#2a2a4a] hover:bg-[#ff5a5f] hover:text-white px-3 py-1.5 rounded-full transition font-bold">ORG</button>
      </div>
      <div id="modal-traits" class="grid grid-cols-2 gap-2"></div>
     </div>
    </div>
   </div>
  </div>
  <script>
    const IPFS_GATEWAY = 'https://ipfs.io/ipfs/';
    const BASE_HASH = 'QmPMc4tcBsMqLRuCQtPmPe84bpSjrC3Ky7t3JWuHXYB4aS';
    const PER_PAGE = 20;
    let currentPage = 1;
    let isRiso = true;
    let cache = {};
    let risoCache = {};

    const defaultConfig = {
      gallery_title: 'Risograph NFT Gallery',
      subtitle_text: '10,000 NFTs reimagined in Risograph style',
      background_color: '#1a1a2e',
      accent_color: '#ff5a5f',
      surface_color: '#2a2a4a',
      text_color: '#e0e0e0',
      muted_color: '#8888aa',
      font_family: 'DM Sans',
      font_size: 16
    };

    function getMetadataUrl(id) {
      return `${IPFS_GATEWAY}${BASE_HASH}/${id}`;
    }

    async function fetchNFT(id) {
      if (cache[id]) return cache[id];
      try {
        const res = await fetch(getMetadataUrl(id));
        const data = await res.json();
        cache[id] = data;
        return data;
      } catch(e) {
        return null;
      }
    }

    function getImageUrl(ipfsUri) {
      if (!ipfsUri) return '';
      return ipfsUri.replace('ipfs://', IPFS_GATEWAY);
    }

    async function createRisographCanvas(imgSrc) {
      return new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d', { willReadFrequently: true });
          
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;

          // Risograph effect through pixel manipulation
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            
            // Convert to grayscale
            const gray = r * 0.299 + g * 0.587 + b * 0.114;
            
            // Increase contrast
            const contrast = 1.6;
            const brightened = (gray - 128) * contrast + 128;
            const saturated = Math.max(0, Math.min(255, brightened * 1.15));
            
            // Apply color channels for risograph look
            data[i] = saturated * 1.1; // Red boost
            data[i + 1] = saturated * 0.9; // Green reduce
            data[i + 2] = saturated * 1.05; // Blue boost
            data[i + 3] = 255; // Full alpha
          }

          // Add halftone pattern
          for (let i = 0; i < data.length; i += 4) {
            const pos = i / 4;
            const x = pos % canvas.width;
            const y = Math.floor(pos / canvas.width);
            
            if ((x + y) % 4 === 0) {
              data[i] = Math.max(0, data[i] - 8);
              data[i + 1] = Math.max(0, data[i + 1] - 8);
              data[i + 2] = Math.max(0, data[i + 2] - 8);
            }
          }

          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => resolve(null);
        img.src = imgSrc;
      });
    }

    function renderGrid(page) {
      const grid = document.getElementById('grid');
      const loading = document.getElementById('loading');
      grid.innerHTML = '';
      loading.classList.remove('hidden');

      const start = (page - 1) * PER_PAGE + 1;
      const end = Math.min(start + PER_PAGE - 1, 9998);
      const ids = [];
      for (let i = start; i <= end; i++) ids.push(i);

      let loaded = 0;
      ids.forEach((id, idx) => {
        fetchNFT(id).then(async data => {
          loaded++;
          if (data) {
            const imgUrl = getImageUrl(data.image);
            
            // Create risograph version
            let risoUrl = risoCache[id];
            if (!risoUrl) {
              risoUrl = await createRisographCanvas(imgUrl);
              if (risoUrl) risoCache[id] = risoUrl;
            }

            const card = document.createElement('div');
            card.className = 'card-enter cursor-pointer group';
            card.style.animationDelay = `${idx * 40}ms`;
            card.innerHTML = `
              <div class="relative rounded-xl overflow-hidden bg-[#2a2a4a] riso-overlay" data-riso="${risoUrl || ''}" data-original="${imgUrl}">
                <img 
                  src="${risoUrl || imgUrl}" 
                  alt="${data.name || '#'+id}" 
                  class="w-full aspect-square object-cover nft-img" 
                  loading="lazy"
                  onerror="this.style.background='#2a2a4a';this.alt='Failed to load';">
                <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-3">
                  <p class="mono text-xs font-bold text-white truncate">${data.name || '#'+id}</p>
                </div>
              </div>
            `;
            card.addEventListener('click', () => openModal(id, data, risoUrl, imgUrl));
            grid.appendChild(card);
          }
          if (loaded === ids.length) loading.classList.add('hidden');
        });
      });
    }

    function openModal(id, data, risoUrl, originalUrl) {
      const modal = document.getElementById('modal');
      const img = document.getElementById('modal-img');
      const title = document.getElementById('modal-title');
      const traits = document.getElementById('modal-traits');
      const wrap = document.getElementById('modal-img-wrap');

      img.src = risoUrl || originalUrl;
      img.dataset.riso = risoUrl;
      img.dataset.original = originalUrl;
      title.textContent = data.name || `#${id}`;
      isRiso = true;
      img.classList.add('riso-filter');
      wrap.classList.add('riso-overlay');

      traits.innerHTML = '';
      if (data.attributes && data.attributes.length) {
        data.attributes.forEach(attr => {
          traits.innerHTML += `
            <div class="bg-[#2a2a4a] rounded-lg p-3">
              <p class="text-[10px] uppercase tracking-wider text-[#8888aa] mb-1">${attr.trait_type || 'Trait'}</p>
              <p class="mono text-sm font-bold text-[#ff5a5f]">${attr.value || '—'}</p>
            </div>
          `;
        });
      } else {
        traits.innerHTML = '<p class="text-[#8888aa] text-sm col-span-2">No traits available</p>';
      }

      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-backdrop').addEventListener('click', closeModal);

    document.getElementById('toggle-original').addEventListener('click', () => {
      const img = document.getElementById('modal-img');
      const wrap = document.getElementById('modal-img-wrap');
      isRiso = !isRiso;
      
      if (isRiso) {
        img.src = img.dataset.riso || img.dataset.original;
        img.classList.add('riso-filter');
        wrap.classList.add('riso-overlay');
      } else {
        img.src = img.dataset.original;
        img.classList.remove('riso-filter');
        wrap.classList.remove('riso-overlay');
      }
    });

    document.getElementById('prev-btn').addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; updatePage(); }
    });
    document.getElementById('next-btn').addEventListener('click', () => {
      if (currentPage < 500) { currentPage++; updatePage(); }
    });
    document.getElementById('page-input').addEventListener('change', (e) => {
      let v = parseInt(e.target.value);
      if (v >= 1 && v <= 500) { currentPage = v; renderGrid(currentPage); }
    });
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const id = parseInt(e.target.value);
        if (id >= 1 && id <= 9998) {
          fetchNFT(id).then(async data => { 
            if (data) {
              const imgUrl = getImageUrl(data.image);
              const risoUrl = await createRisographCanvas(imgUrl);
              openModal(id, data, risoUrl, imgUrl);
            }
          });
        }
      }
    });

    function updatePage() {
      document.getElementById('page-input').value = currentPage;
      renderGrid(currentPage);
    }

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('main-title').textContent = config.gallery_title || defaultConfig.gallery_title;
        document.getElementById('subtitle').textContent = config.subtitle_text || defaultConfig.subtitle_text;
        const font = config.font_family || defaultConfig.font_family;
        document.body.style.fontFamily = `${font}, sans-serif`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }},
          { get: () => config.muted_color || defaultConfig.muted_color, set: (v) => { config.muted_color = v; window.elementSdk.setConfig({ muted_color: v }); }}
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }},
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }}
      }),
      mapToEditPanelValues: (config) => new Map([
        ['gallery_title', config.gallery_title || defaultConfig.gallery_title],
        ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text]
      ])
    });

    // Init
    renderGrid(1);
    lucide.createIcons();
  </script>
